# secret.yaml.example — create real secret via kubectl or sealed-secrets
apiVersion: v1
kind: Secret
meta
  name: stockseva-secrets
type: Opaque
stringData:
  db-host: "postgres-service.default.svc.cluster.local"  # K8s DNS name
  db-name: "stockseva"
  db-user: "stockseva_user"
  db-password: "CHANGE_ME_IN_PRODUCTION"
  redis-host: "redis-service.default.svc.cluster.local"