# ── Required: Project Identity ──────────────────────────────────────────────
sonar.projectKey=stockseva-streamlit
sonar.projectName=StockSeva Inventory Platform
sonar.projectVersion=1.0

# ── Source Configuration ────────────────────────────────────────────────────
sonar.sources=.
sonar.inclusions=**/*.py
sonar.exclusions=**/tests/**,**/__pycache__/**,**/*.pyc,**/venv/**,**/.venv/**,**/node_modules/**

# ── Python-Specific Settings ────────────────────────────────────────────────
sonar.language=py
sonar.python.version=3.11

# ── Test Coverage (if using pytest-cov) ─────────────────────────────────────
sonar.python.coverage.reportPaths=coverage.xml
sonar.tests=tests

# ── Quality Gate Thresholds (optional) ──────────────────────────────────────
# sonar.qualitygate.wait=true
# sonar.qualitygate.timeout=300